{% extends "game/grid/base_grid.djhtml" %}
{% block title %}
  {{ level.name }}
{% endblock title %}
{% block body %}
  <h1 class="mt-5">{{ level.name }}</h1>
  <button id="start-btn"
          class="py-2 px-4 mt-[10px] text-base rounded-md bg-blue-500 text-white cursor-pointer disabled:bg-gray-500 disabled:cursor-not-allowed">
    Start Game
  </button>
  <button id="reset-btn"
          class="py-2 px-4 mt-[10px] text-base rounded-md bg-blue-500 text-white cursor-pointer disabled:bg-gray-500 disabled:cursor-not-allowed">
    Reset Game
  </button>
  <div id="game-container" class="flex justify-center gap-[30px] items-start mt-5">
    {% include "game/grid/dock.djhtml" %}
    {% include "game/grid/grid_board.djhtml" %}
    <div class="w-[150px] text-white p-[10px]"></div>
  </div>
  <script>
    window.gameConfig = {
      gridWidth: {{ level.width }},
      levelId: {{ level.id }},
      gameStarted: {{ game_started|yesno:"true,false" }},
      urls: {
        updateVehicle: "/update_vehicle_position/",
        markStart: "/mark_game_started/{{ level.id }}/",
        resetLevel: "/reset_level/{{ level.id }}/"
      }
    };
  </script>
  <script type="module">
    import { GameGrid } from '/static/game/grid.js';
    const root = document.getElementById('game-container');
    new GameGrid(root, window.gameConfig);
  </script>
{% endblock body %}
